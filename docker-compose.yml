services:
  db:
    image: postgres:16-alpine
    container_name: gymsaas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gymsaas}
      POSTGRES_USER: ${POSTGRES_USER:-gymsaas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gymsaas}
    ports:
      - "5433:5432"
    volumes:
      - gymsaas_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gymsaas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  whatsapp:
    build:
      context: ./whatsapp-service
    container_name: gymsaas_whatsapp
    restart: unless-stopped
    environment:
      PORT: 3000
      SHARED_TOKEN: ${SHARED_TOKEN:-changeme}
      DJANGO_WEBHOOK_URL: ${DJANGO_WEBHOOK_URL:-http://backend:8000/api/webhooks/whatsapp/}
    ports:
      - "3000:3000"
    volumes:
      # Sesiones de Baileys persistidas entre reinicios del contenedor
      - gymsaas_wa_sessions:/app/sessions
      # Hot-reload en desarrollo: los cambios en src/ se reflejan sin rebuild
      - ./whatsapp-service/src:/app/src
    command: npx nodemon src/index.js

volumes:
  gymsaas_pgdata:
  gymsaas_wa_sessions: